{% extends "base.html" %}

{% block title %}Créer un article - MangaBook V2{% endblock %}

{% block content %}
<h2>Créer un article</h2>

<form method="post" enctype="multipart/form-data" style="max-width: 700px;">
    <div style="margin-bottom: 12px;">
        <label for="name">Nom</label><br>
        <input id="name" name="name" value="{{ data.name if data else '' }}" required>
    </div>

    <div style="margin-bottom: 12px;">
        <label for="genres">Genre</label><br>
        <select id="genres" name="genres" required>
            <option value="">-- Choisir --</option>
            {% for g in ["manga", "figurine", "textile", "vaisselle", "goodies"] %}
                <option value="{{ g }}" {% if data and data.genres == g %}selected{% endif %}>{{ g }}</option>
            {% endfor %}
        </select>
    </div>

    <div style="margin-bottom: 12px;">
        <label for="universe">Univers</label><br>
        <input id="universe" name="universe" value="{{ data.universe if data else '' }}">
    </div>

    <div style="margin-bottom: 12px;">
        <label for="image">Chemin image</label><br>
        <input id="image" name="image" value="{{ data.image if data else '' }}">
    </div>

    <div style="margin-bottom: 12px;">
        <label for="image_file">Upload image</label><br>
        <input id="image_file" type="file" name="image">
    </div>

    <div style="margin-bottom: 12px;">
        <label for="price">Prix</label><br>
        <input id="price" name="price" type="number" step="0.01" value="{{ data.price if data else '' }}" required>
    </div>

    <div style="margin-bottom: 12px;">
        <label for="stock">Stock</label><br>
        <input id="stock" name="stock" type="number" value="{{ data.stock if data else '' }}" required>
    </div>

    <div style="margin-bottom: 12px;">
        <label for="release_day">Jour de sortie</label><br>
        <select id="release_day" name="release_day">
            <option value="">-- Aucun --</option>
            {% for day in ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi", "Dimanche", "Sans jour fixe"] %}
                <option value="{{ day }}" {% if data and data.release_day == day %}selected{% endif %}>{{ day }}</option>
            {% endfor %}
        </select>
    </div>

    <button type="submit">Créer l’article</button>
</form>
{% endblock %}
