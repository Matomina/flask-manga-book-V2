{% extends "base.html" %}

{% block content %}
<h2>Messages de contact</h2>

{% for msg in messages %}
    <div>
        <strong>{{ msg["sujet"] }}</strong><br>
        {{ msg["email"] or "Anonyme" }}<br>
        {{ msg["status"] }}<br>

        <a href="{{ url_for('admin.contact_detail', contact_id=msg['id']) }}">
            Voir
        </a>
    </div>
    <hr>
{% endfor %}

{% endblock %}
