{% extends "base.html" %} {% block title %}Connexion - MangaBook V2{% endblock
%} {% block content %}

<section class="auth-login">
  <header class="auth-login__header">
    <h2>Connexion</h2>
    <p>
      Connectez-vous à votre compte MangaBook pour accéder aux fonctionnalités
      réservées.
    </p>
  </header>

  <form action="{{ url_for('auth.login') }}" method="post" class="auth-form">
    <div class="auth-form__group">
      <label for="email">Adresse email</label>
      <input
        type="email"
        id="email"
        name="email"
        required
        autocomplete="email"
        placeholder="exemple@email.com"
      />
    </div>

    <div class="auth-form__group">
      <label for="password">Mot de passe</label>
      <input
        type="password"
        id="password"
        name="password"
        required
        autocomplete="current-password"
        placeholder="Votre mot de passe"
      />
    </div>

    <div class="auth-form__actions">
      <button type="submit" class="btn btn-primary">Se connecter</button>
    </div>
  </form>

  <p class="auth-login__hint">
    Pas encore de compte ?
    <a href="{{ url_for('auth.register') }}">Créer un compte</a>
  </p>
</section>

{% endblock %}
