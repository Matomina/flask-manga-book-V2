<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}MangaBook V2{% endblock %}</title>
  </head>
  <body>
    <header>
      <h1>MangaBook V2</h1>
      <nav>
        <a href="{{ url_for('public.home') }}">Accueil</a>
        <a href="{{ url_for('public.articles') }}">Catalogue</a>
        <a href="{{ url_for('public.favorites') }}">Favoris</a>
        <a href="{{ url_for('public.about') }}">À propos</a>
        <a href="{{ url_for('public.contact') }}">Contact</a>
        <a href="{{ url_for('auth.login') }}">Connexion</a>
        <a href="{{ url_for('forum.index') }}">Forum</a>
        <a href="{{ url_for('admin.dashboard') }}">Admin</a>
      </nav>
      <hr />
    </header>

    <main>
      {% with messages = get_flashed_messages(with_categories=true) %} {% if
      messages %}
      <div class="flash-messages">
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %} {% endwith %} {% block content %}{% endblock %}
    </main>
  </body>
</html>
