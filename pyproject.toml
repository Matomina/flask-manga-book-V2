[tool.ruff]
line-length = 88
target-version = "py312"
exclude = [
    ".git",
    ".ruff_cache",
    ".pytest_cache",
    ".mypy_cache",
    "__pycache__",
    ".venv",
    "venv",
    "env",
    "instance",
    "node_modules",
    "dist",
    "build",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "B",
]
ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-ra --strict-markers --cov=app --cov-report=term-missing"

[tool.ruff.lint.per-file-ignores]
"tests/conftest.py" = ["E402"]